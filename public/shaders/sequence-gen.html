<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Mind Agency — Logo 序列帧生成器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 13px; margin-bottom: 28px; }

  /* Controls */
  .controls { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px; align-items: flex-end; }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 11px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .control-group input, .control-group select {
    background: #111118; border: 1px solid #2a2a3a; color: #e0e0e0;
    padding: 8px 12px; border-radius: 8px; font-size: 13px; width: 120px;
    outline: none; transition: border-color 0.2s;
  }
  .control-group input:focus, .control-group select:focus { border-color: #7ec8e3; }

  /* Buttons */
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #33CCFF, #AA66FF); color: #fff; }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(51,204,255,0.3); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: #1e1e30; color: #ccc; border: 1px solid #333; }
  .btn-secondary:hover { background: #2a2a40; }
  .btn-group { display: flex; gap: 8px; }

  /* Progress */
  .progress-bar { width: 100%; height: 6px; background: #1a1a2a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #33CCFF, #AA66FF); border-radius: 3px; transition: width 0.1s; }
  .progress-text { font-size: 12px; color: #888; margin-top: 4px; }

  /* Preview */
  .preview-section { margin-top: 28px; }
  .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .preview-header h2 { font-size: 15px; font-weight: 600; color: #aaa; }
  .frame-grid {
    display: grid; gap: 8px;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  }
  .frame-cell {
    aspect-ratio: 1; border-radius: 8px; overflow: hidden;
    border: 1px solid #1e1e30; position: relative; background: #0d0d15;
  }
  .frame-cell img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .frame-cell .frame-num {
    position: absolute; bottom: 2px; right: 4px; font-size: 9px;
    color: rgba(255,255,255,0.5); font-family: monospace;
  }

  /* Sprite sheet preview */
  .sprite-preview {
    margin-top: 20px; padding: 16px; background: #111118;
    border-radius: 12px; border: 1px solid #1e1e30; overflow-x: auto;
  }
  .sprite-preview img { height: 120px; image-rendering: pixelated; border-radius: 4px; }

  /* Hidden canvas for rendering */
  #renderCanvas { display: none; }

  /* Log */
  .log {
    margin-top: 16px; padding: 12px; background: #0d0d15; border-radius: 8px;
    border: 1px solid #1a1a2a; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #666; max-height: 150px; overflow-y: auto;
    line-height: 1.6;
  }
  .log .ok { color: #4ade80; }
  .log .info { color: #7ec8e3; }
  .log .warn { color: #fbbf24; }

  /* Animation preview */
  .anim-preview {
    margin-top: 20px; display: flex; align-items: center; gap: 16px;
  }
  .anim-canvas-wrap {
    width: 160px; height: 160px; border-radius: 12px; overflow: hidden;
    border: 1px solid #1e1e30; background: #0d0d15; flex-shrink: 0;
  }
  .anim-canvas-wrap canvas { width: 100%; height: 100%; image-rendering: pixelated; }
  .anim-controls { display: flex; flex-direction: column; gap: 8px; }
  .anim-controls label { font-size: 11px; color: #888; }
</style>
</head>
<body>
<div class="container">
  <h1>Logo 序列帧生成器</h1>
  <p class="subtitle">WebGL 渲染噪波球体 Shader → 导出 PNG 序列帧 + Sprite Sheet</p>

  <!-- Controls -->
  <div class="controls">
    <div class="control-group">
      <label>帧数</label>
      <input type="number" id="frameCount" value="24" min="4" max="120">
    </div>
    <div class="control-group">
      <label>分辨率</label>
      <select id="resolution">
        <option value="128">128×128</option>
        <option value="256" selected>256×256</option>
        <option value="512">512×512</option>
        <option value="1024">1024×1024</option>
      </select>
    </div>
    <div class="control-group">
      <label>动画周期(秒)</label>
      <input type="number" id="duration" value="2" min="0.5" max="10" step="0.5">
    </div>
    <div class="control-group">
      <label>FPS</label>
      <input type="number" id="fps" value="12" min="1" max="60">
    </div>
    <div class="control-group">
      <label>背景</label>
      <select id="bgMode">
        <option value="transparent">透明</option>
        <option value="black">黑色</option>
        <option value="dark">深色 #0a0a0f</option>
      </select>
    </div>
    <div class="btn-group" style="padding-bottom: 2px;">
      <button class="btn btn-primary" id="btnRender" onclick="startRender()">▶ 渲染序列帧</button>
      <button class="btn btn-secondary" id="btnDownloadAll" onclick="downloadAll()" disabled>📥 下载全部</button>
      <button class="btn btn-secondary" id="btnSpriteSheet" onclick="downloadSpriteSheet()" disabled>🧩 Sprite Sheet</button>
    </div>
  </div>

  <!-- Progress -->
  <div id="progressWrap" style="display:none;">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">准备中...</div>
  </div>

  <!-- Animation Preview -->
  <div class="anim-preview" id="animPreview" style="display:none;">
    <div class="anim-canvas-wrap">
      <canvas id="animCanvas" width="256" height="256"></canvas>
    </div>
    <div class="anim-controls">
      <label>动画预览</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="toggleAnim()" id="btnToggleAnim">⏸ 暂停</button>
        <select id="previewFps" onchange="updateAnimFps()" style="background:#111118;border:1px solid #2a2a3a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:12px;">
          <option value="8">8 FPS</option>
          <option value="12" selected>12 FPS</option>
          <option value="24">24 FPS</option>
          <option value="30">30 FPS</option>
        </select>
      </div>
      <label style="margin-top:4px;">帧: <span id="animFrameNum">0</span> / <span id="animFrameTotal">0</span></label>
    </div>
  </div>

  <!-- Frame Grid -->
  <div class="preview-section" id="previewSection" style="display:none;">
    <div class="preview-header">
      <h2>序列帧预览</h2>
      <span style="font-size:12px;color:#555;" id="frameInfo"></span>
    </div>
    <div class="frame-grid" id="frameGrid"></div>
  </div>

  <!-- Sprite Sheet -->
  <div class="sprite-preview" id="spriteSection" style="display:none;">
    <h2 style="font-size:13px;font-weight:600;color:#aaa;margin-bottom:12px;">Sprite Sheet</h2>
    <div id="spriteWrap"></div>
  </div>

  <!-- Log -->
  <div class="log" id="log"></div>
</canvas>

<canvas id="renderCanvas"></canvas>

<script>
// ---- GLSL Shader (same as logo-canvas.tsx) ----
const VERT = `attribute vec2 a_position;void main(){gl_Position=vec4(a_position,0.0,1.0);}`;

const FRAG = `precision highp float;
uniform float uTime;
uniform vec2 uResolution;

vec3 palette(float d){return mix(vec3(0.2,0.7,0.9),vec3(1.,0.,1.),d);}
vec2 rotate(vec2 p,float a){float c=cos(a);float s=sin(a);return p*mat2(c,s,-s,c);}
float hash(vec3 p){p=fract(p*0.3183099+0.1);p*=17.0;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}
float noise(vec3 x){vec3 i=floor(x);vec3 f=fract(x);f=f*f*(3.0-2.0*f);return mix(mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);}
float fbm(vec3 p){float v=0.0;float a=0.5;vec3 shift=vec3(100.0);for(int i=0;i<5;++i){v+=a*noise(p);p=p*2.0+shift;a*=0.5;}return v;}
float map(vec3 p){float sphere=length(p);vec3 q=p*0.10;float n=fbm(q+vec3(uTime*0.20));float d=sphere-n*3.0;return d;}
vec4 rm(vec3 ro,vec3 rd){float t=0.;vec3 col=vec3(0.);float d;for(float i=0.;i<80.;i++){vec3 p=ro+rd*t;d=map(p);if(d<0.02||t>100.0)break;col+=palette(length(p)*0.1)/(300.*d);t+=d;}return vec4(col,1./(d*100.));}

void main(){
  vec2 uv=(gl_FragCoord.xy-uResolution.xy/2.)/uResolution.x;
  vec3 ro=vec3(0.,0.,-25.);
  ro.xz=rotate(ro.xz,uTime*0.3);
  vec3 cf=normalize(-ro);
  vec3 cs=normalize(cross(cf,vec3(0.,1.,0.)));
  vec3 cu=normalize(cross(cf,cs));
  vec3 uuv=ro+cf*3.+uv.x*cs+uv.y*cu;
  vec3 rd=normalize(uuv-ro);
  vec4 col=rm(ro,rd);
  gl_FragColor=col;
}`;

// ---- WebGL helpers ----
function createShader(gl, type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    gl.deleteShader(s);
    return null;
  }
  return s;
}

function createProgram(gl, vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs);
  gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error('Link error:', gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

// ---- State ----
let frames = []; // { dataURL, pixels, time }
let rendering = false;
let animInterval = null;
let animFrame = 0;

// ---- Log ----
function log(msg, cls = '') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

// ---- Render ----
async function startRender() {
  if (rendering) return;
  rendering = true;

  const frameCount = parseInt(document.getElementById('frameCount').value);
  const res = parseInt(document.getElementById('resolution').value);
  const duration = parseFloat(document.getElementById('duration').value);
  const bgMode = document.getElementById('bgMode').value;

  document.getElementById('btnRender').disabled = true;
  document.getElementById('btnDownloadAll').disabled = true;
  document.getElementById('btnSpriteSheet').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('spriteSection').style.display = 'none';
  document.getElementById('animPreview').style.display = 'none';
  document.getElementById('log').innerHTML = '';
  frames = [];

  log(`开始渲染 — ${frameCount}帧, ${res}×${res}, 周期${duration}s, 背景:${bgMode}`, 'info');

  const canvas = document.getElementById('renderCanvas');
  canvas.width = res;
  canvas.height = res;

  const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true, premultipliedAlpha: false })
           || canvas.getContext('experimental-webgl', { preserveDrawingBuffer: true, premultipliedAlpha: false });
  if (!gl) { log('WebGL 不支持!', 'warn'); rendering = false; document.getElementById('btnRender').disabled = false; return; }

  const vs = createShader(gl, gl.VERTEX_SHADER, VERT);
  const fs = createShader(gl, gl.FRAGMENT_SHADER, FRAG);
  if (!vs || !fs) { rendering = false; document.getElementById('btnRender').disabled = false; return; }

  const prog = createProgram(gl, vs, fs);
  gl.useProgram(prog);

  // Quad
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const ap = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(ap);
  gl.vertexAttribPointer(ap, 2, gl.FLOAT, false, 0, 0);

  const tLoc = gl.getUniformLocation(prog, 'uTime');
  const rLoc = gl.getUniformLocation(prog, 'uResolution');

  // Prepare background
  if (bgMode === 'black') {
    gl.clearColor(0, 0, 0, 1);
  } else if (bgMode === 'dark') {
    gl.clearColor(10/255, 10/255, 15/255, 1);
  } else {
    gl.clearColor(0, 0, 0, 0);
  }

  const grid = document.getElementById('frameGrid');
  grid.innerHTML = '';
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('frameInfo').textContent = `0 / ${frameCount}`;

  // Render frames with yield to UI
  for (let i = 0; i < frameCount; i++) {
    const t = (i / frameCount) * duration;

    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform1f(tLoc, t);
    gl.uniform2f(rLoc, res, res);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // Read pixels
    const pixels = new Uint8Array(res * res * 4);
    gl.readPixels(0, 0, res, res, gl.RGBA, gl.UNSIGNED_BYTE, pixels);

    // Convert to data URL via 2D canvas (flips Y)
    const c2d = document.createElement('canvas');
    c2d.width = res; c2d.height = res;
    const ctx = c2d.getContext('2d');
    const imgData = ctx.createImageData(res, res);
    // Flip Y (WebGL is bottom-up)
    for (let y = 0; y < res; y++) {
      const srcRow = (res - 1 - y) * res * 4;
      const dstRow = y * res * 4;
      imgData.data.set(pixels.subarray(srcRow, srcRow + res * 4), dstRow);
    }
    ctx.putImageData(imgData, 0, 0);

    const dataURL = c2d.toDataURL('image/png');
    frames.push({ dataURL, time: t, index: i });

    // Add to grid
    const cell = document.createElement('div');
    cell.className = 'frame-cell';
    cell.innerHTML = `<img src="${dataURL}" alt="frame ${i}"><span class="frame-num">#${String(i).padStart(3,'0')}</span>`;
    grid.appendChild(cell);

    // Update progress
    const pct = ((i + 1) / frameCount * 100).toFixed(0);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = `渲染中... ${i + 1}/${frameCount} (${pct}%)`;
    document.getElementById('frameInfo').textContent = `${i + 1} / ${frameCount}`;

    // Yield to browser every 2 frames
    if (i % 2 === 0) await new Promise(r => requestAnimationFrame(r));
  }

  log(`✓ 渲染完成 — ${frameCount}帧, ${res}×${res}`, 'ok');
  document.getElementById('progressText').textContent = `完成! ${frameCount}帧已渲染`;
  document.getElementById('btnRender').disabled = false;
  document.getElementById('btnDownloadAll').disabled = false;
  document.getElementById('btnSpriteSheet').disabled = false;
  rendering = false;

  // Build sprite sheet preview
  buildSpriteSheet();

  // Start animation preview
  startAnimPreview();
}

// ---- Sprite Sheet ----
function buildSpriteSheet() {
  if (frames.length === 0) return;
  const res = parseInt(document.getElementById('resolution').value);
  const cols = Math.ceil(Math.sqrt(frames.length));
  const rows = Math.ceil(frames.length / cols);

  const sheet = document.createElement('canvas');
  sheet.width = res * cols;
  sheet.height = res * rows;
  const ctx = sheet.getContext('2d');

  frames.forEach((f, i) => {
    const img = new Image();
    img.src = f.dataURL;
    // Sync load since dataURL is already in memory
    const col = i % cols;
    const row = Math.floor(i / cols);
    ctx.drawImage(img, col * res, row * res, res, res);
  });

  const wrap = document.getElementById('spriteWrap');
  wrap.innerHTML = '';
  const img = new Image();
  img.src = sheet.toDataURL('image/png');
  img.style.height = '120px';
  img.style.imageRendering = 'pixelated';
  wrap.appendChild(img);

  document.getElementById('spriteSection').style.display = 'block';

  // Store for download
  window._spriteSheetURL = sheet.toDataURL('image/png');
  window._spriteCols = cols;
  window._spriteRows = rows;
}

// ---- Animation Preview ----
function startAnimPreview() {
  if (frames.length === 0) return;
  const canvas = document.getElementById('animCanvas');
  const res = parseInt(document.getElementById('resolution').value);
  canvas.width = res;
  canvas.height = res;
  const ctx = canvas.getContext('2d');

  animFrame = 0;
  document.getElementById('animPreview').style.display = 'flex';
  document.getElementById('animFrameTotal').textContent = frames.length;

  if (animInterval) clearInterval(animInterval);
  const fps = parseInt(document.getElementById('previewFps').value);
  animInterval = setInterval(() => {
    const img = new Image();
    img.src = frames[animFrame].dataURL;
    ctx.clearRect(0, 0, res, res);
    ctx.drawImage(img, 0, 0, res, res);
    document.getElementById('animFrameNum').textContent = animFrame;
    animFrame = (animFrame + 1) % frames.length;
  }, 1000 / fps);
}

function toggleAnim() {
  if (animInterval) {
    clearInterval(animInterval);
    animInterval = null;
    document.getElementById('btnToggleAnim').textContent = '▶ 播放';
  } else {
    startAnimPreview();
    document.getElementById('btnToggleAnim').textContent = '⏸ 暂停';
  }
}

function updateAnimFps() {
  if (animInterval) {
    clearInterval(animInterval);
    startAnimPreview();
  }
}

// ---- Downloads ----
function downloadAll() {
  if (frames.length === 0) return;
  const pad = String(frames.length).length;
  frames.forEach((f, i) => {
    const a = document.createElement('a');
    a.href = f.dataURL;
    a.download = `logo_${String(i).padStart(pad, '0')}.png`;
    a.click();
  });
  log(`📥 已触发 ${frames.length} 个文件下载`, 'ok');
}

function downloadSpriteSheet() {
  if (!window._spriteSheetURL) return;
  const a = document.createElement('a');
  a.href = window._spriteSheetURL;
  const res = parseInt(document.getElementById('resolution').value);
  a.download = `logo_sprite_${frames.length}f_${res}x${res}.png`;
  a.click();
  log(`📥 Sprite Sheet 已下载 (${window._spriteCols}×${window._spriteRows} 网格)`, 'ok');
}
</script>
</body>
</html>
