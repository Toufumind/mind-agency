<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d12"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="sphere" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#33CCFF" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#44AAFF" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#9966FF" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#CC44FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0.25"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="5" seed="2"/>
      <feDisplacementMap in="SourceGraphic" scale="4"/>
    </filter>
  </defs>
  <!-- 暗底 -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- 外发光层 -->
  <circle cx="128" cy="128" r="85" fill="#33CCFF" opacity="0.1" filter="url(#glow)"/>
  <!-- 噪波球体主体 -->
  <g filter="url(#noise)">
    <ellipse cx="128" cy="128" rx="80" ry="80" fill="url(#sphere)"/>
    <ellipse cx="115" cy="108" rx="32" ry="28" fill="white" opacity="0.12"/>
  </g>
  <!-- 轨道粒子 -->
  <circle cx="72" cy="95" r="5" fill="#33CCFF" opacity="0.5"/>
  <circle cx="185" cy="78" r="4" fill="#66AAFF" opacity="0.4"/>
  <circle cx="198" cy="155" r="5" fill="#AA66FF" opacity="0.35"/>
  <circle cx="90" cy="195" r="4" fill="#FF44FF" opacity="0.25"/>
  <circle cx="155" cy="188" r="4.5" fill="#CC55FF" opacity="0.3"/>
  <circle cx="60" cy="150" r="3.5" fill="#55BBFF" opacity="0.35"/>
</svg>
