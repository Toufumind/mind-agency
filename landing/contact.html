<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Mind Agency</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#fff;color:#0f172a;line-height:1.6}
a{color:inherit;text-decoration:none}
.ctn{max-width:640px;margin:0 auto;padding:0 24px}

nav{border-bottom:1px solid #e0e4eb;padding:16px 0}
.ni{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.nl{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px}
.nl img{width:28px;height:28px;border-radius:6px}
.nk{display:flex;gap:24px}
.nk a{font-size:13px;font-weight:500;color:#64748b;transition:color .2s}
.nk a:hover{color:#0f172a}

.main{padding:64px 0}
h1{font-size:32px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.sub{font-size:15px;color:#64748b;margin-bottom:32px;line-height:1.6}
.note{font-size:12px;color:#94a3b8;margin-bottom:32px;padding:12px 16px;background:#f6f8fb;border-radius:8px;border:1px solid #e0e4eb}

.form{display:flex;flex-direction:column;gap:20px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field label{display:block;font-size:12px;font-weight:600;color:#334155;margin-bottom:6px}
.field input,.field select,.field textarea{
  width:100%;padding:10px 14px;border:1px solid #e0e4eb;border-radius:8px;
  font-size:14px;font-family:inherit;background:#fff;color:#0f172a;
  transition:border-color .2s;outline:none
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#2563eb}
.field textarea{resize:vertical;min-height:100px}

.btn{
  padding:12px 28px;border-radius:8px;border:none;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit
}
.btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;box-shadow:0 1px 4px rgba(37,99,235,.2)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.3)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.msg{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:8px}
.msg-ok{background:#ecfdf5;color:#16a34a;border:1px solid #bbf7d0}
.msg-err{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}

footer{border-top:1px solid #e0e4eb;padding:32px 0;color:#94a3b8;font-size:12px;text-align:center}

@media(max-width:640px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav><div class="ni">
  <a href="/" class="nl"><img src="public/logo-static.png" alt="Mind Agency">Mind Agency</a>
  <div class="nk"><a href="/#features">Features</a><a href="/#quickstart">Quick Start</a><a href="/">Home</a></div>
</div></nav>

<main class="main"><div class="ctn">
  <h1>联系我们</h1>
  <p class="sub">有什么想法？想合作？还是只是想聊聊 AI Agent 的未来？填个表，我们会回复你。</p>
  <p class="note">📧 请使用工作邮箱提交，个人邮箱（Gmail、Outlook 等）可能不会被处理。</p>

  <form class="form" id="contactForm">
    <div class="row">
      <div class="field"><label>姓名 *</label><input type="text" name="first_name" required placeholder="你的名字"></div>
      <div class="field"><label>姓氏</label><input type="text" name="last_name" placeholder="姓氏"></div>
    </div>
    <div class="field"><label>工作邮箱 *</label><input type="email" name="email" required placeholder="you@company.com"></div>
    <div class="field"><label>公司名称</label><input type="text" name="company" placeholder="公司名"></div>
    <div class="row">
      <div class="field">
        <label>公司规模</label>
        <select name="company_size">
          <option value="">请选择</option>
          <option>1-10 人</option>
          <option>11-50 人</option>
          <option>51-200 人</option>
          <option>201-500 人</option>
          <option>501-1000 人</option>
          <option>1000+ 人</option>
        </select>
      </div>
      <div class="field">
        <label>地区</label>
        <select name="country">
          <option value="">请选择</option>
          <option>中国大陆</option>
          <option>中国香港</option>
          <option>中国台湾</option>
          <option>日本</option>
          <option>韩国</option>
          <option>美国</option>
          <option>欧洲</option>
          <option>东南亚</option>
          <option>其他</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>用途</label>
      <select name="use_case">
        <option value="">请选择</option>
        <option>评估用于团队</option>
        <option>公司全面部署</option>
        <option>自托管</option>
        <option>与现有工具集成</option>
        <option>合作/代理咨询</option>
        <option>其他</option>
      </select>
    </div>
    <div class="field"><label>你的需求或问题</label><textarea name="message" placeholder="告诉我们你想用 Mind Agency 做什么..."></textarea></div>
    <div><button type="submit" class="btn btn-primary" id="submitBtn">提交</button></div>
    <div id="formMsg"></div>
  </form>
</div></main>

<footer>© 2026 Toufumind · Mind Agency · <a href="/" style="color:#64748b">返回首页</a></footer>

<script>
document.getElementById('contactForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const msg = document.getElementById('formMsg');
  btn.disabled = true;
  btn.textContent = '提交中...';

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const result = await res.json();

    if (result.success) {
      msg.className = 'msg msg-ok';
      msg.textContent = '✅ ' + result.message;
      e.target.reset();
    } else {
      msg.className = 'msg msg-err';
      msg.textContent = '❌ ' + (result.error || '提交失败');
    }
  } catch (err) {
    msg.className = 'msg msg-err';
    msg.textContent = '❌ 网络错误，请稍后重试';
  }

  btn.disabled = false;
  btn.textContent = '提交';
});
</script>
</body>
</html>
