name: daily-status-update
description: 撰写今日进展简报，汇总dev-team群组的工作成果
steps:
  - id: step1
    agent: Alice
    action: create
    prompt: "作为项目管理协调者，请汇总今天（2026-06-09）dev-team群组的所有工作进展，撰写一份简短的日报状态更新（约200-300字）。内容需包含：1）今日完成的主要任务列表（如AI写作工具介绍、广告文案改进v2、小红书种草笔记初稿、便携式咖啡机商品文案、小说协作创作等）；2）各成员贡献（Alice负责协调与多个创作任务、Bob负责审阅与写作、Charlie负责章节创作与排版）；3）关键成果与数据（如广告文案从33/60提升到49/60、小说协作产出~20KB内容、17/17自动化测试通过等）；4）待办事项或明日计划。将结果保存为 Groups/dev-team/daily-status.md。"
    reviewer: Bob
    evaluate: true
  - id: step2
    agent: Bob
    action: review
    prompt: "请审阅 Groups/dev-team/daily-status.md 文件中的日报状态更新。重点检查：1）事实准确性——各项任务描述是否与今天群聊记录一致，数据是否正确；2）完整性——是否有遗漏的重要工作项；3）表述清晰度——语言是否简洁专业，适合团队周报/日报场景；4）逻辑结构——信息组织是否合理有序。给出修改意见并直接在文件中标注需要改进的地方，将审阅意见写入 Groups/dev-team/daily-status-review.md。"
    dependsOn: [step1]
    reviewer: Bob
    evaluate: true
  - id: step3
    agent: Charlie
    action: create
    prompt: "请根据 Bob 的审阅意见（Groups/dev-team/daily-status-review.md）对日报状态更新进行最终修改和排版美化。具体要求：1）根据审阅意见修正事实错误和补充遗漏内容；2）使用清晰的 Markdown 格式排版，包含标题、分节、要点列表；3）语言风格保持简洁专业，适合向上级或全团队展示；4）最终文件保存为 Groups/dev-team/daily-status-final.md。完成后在群组中通知 Alice 确认。"
    dependsOn: [step2]
    reviewer: Bob
    evaluate: true
