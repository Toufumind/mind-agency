name: AI技术文章创作工作流
description: 创作一篇高质量的AI技术文章，涵盖最新发展趋势、应用场景与未来展望
steps:
  - id: step1
    agent: Bob
    action: create
    prompt: "请创作一篇关于AI技术的深度文章，主题为'生成式AI的行业应用与未来趋势'。要求：1) 文章长度1500-2000字；2) 包含引言、主体（至少3个具体应用场景）、未来展望、结论；3) 使用专业但易懂的语言；4) 引用最新的行业数据或案例；5) 保存为 ai-tech-article.md 文件。"
    reviewer: Charlie
    evaluate: true
  - id: step2
    agent: Charlie
    action: review
    prompt: "请审查Bob提交的AI技术文章初稿。审查重点：1) 技术准确性：AI相关概念、数据是否准确；2) 内容深度：是否深入分析了应用场景；3) 可读性：语言是否流畅、结构是否清晰；4) 原创性：是否有独特的观点或见解；5) 提出具体的改进建议（至少3条）。将审查结果保存为 ai-article-review.md。"
    dependsOn: [step1]
    reviewer: Charlie
    evaluate: true
  - id: step3
    agent: Bob
    action: fix
    prompt: "根据Charlie的审查意见，对AI技术文章进行全面修订。具体要求：1) 逐一解决审查中提出的问题；2) 补充缺失的技术细节或案例；3) 优化文章结构和语言表达；4) 确保修改后的文章在准确性、深度和可读性上都有显著提升；5) 保存修订版为 ai-tech-article-revised.md。"
    dependsOn: [step2]
    evaluate: true
  - id: step4
    agent: Alice
    action: verify
    prompt: "作为项目协调者，请对修订后的AI技术文章进行最终审查。重点关注：1) 整体质量是否达到发布标准；2) 是否符合团队的技术写作规范；3) 文章的核心观点是否清晰有力；4) 如果通过审查，将最终版本保存为 ai-tech-article-final.md；5) 如果未通过，列出具体问题并要求进一步修改。"
    dependsOn: [step3]
    evaluate: true
