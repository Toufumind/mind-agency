name: AI科普文章创作工作流
description: 创作一篇关于人工智能的科普文章，包括大纲设计、初稿撰写、专业审查和最终发布
steps:
  - id: step1
    agent: Bob
    action: create
    prompt: "请作为AI专家，为一篇面向普通读者的AI科普文章创建详细大纲。要求：1）确定文章主题和核心论点；2）设计3-5个主要章节结构；3）为每个章节列出要覆盖的关键知识点；4）考虑读者的认知水平，确保内容由浅入深；5）大纲需要包含引言、主体和结论部分。产出格式为清晰的大纲文档。"
    reviewer: Charlie
    evaluate: true
  - id: step2
    agent: Charlie
    action: create
    prompt: "请根据Bob提供的大纲，撰写一篇完整的AI科普文章初稿。要求：1）严格遵循大纲结构，覆盖所有关键知识点；2）使用通俗易懂的语言，避免过多专业术语；3）适当加入生活中的AI应用案例增强可读性；4）文章长度控制在1200-1500字；5）确保逻辑连贯，段落过渡自然；6）在文末添加参考资料或延伸阅读建议。"
    dependsOn: [step1]
    reviewer: Bob
    evaluate: true
  - id: step3
    agent: Alice
    action: review
    prompt: "请作为项目协调者和内容审核员，对Charlie撰写的AI科普文章初稿进行全面审查。审查维度包括：1）内容准确性：检查AI相关概念、数据、案例是否正确；2）可读性：评估语言是否通俗易懂，结构是否清晰；3）完整性：确认是否覆盖了大纲的所有要点；4）吸引力：评价文章对普通读者的吸引力；5）专业性：确保科普内容的科学严谨性。请提供详细的修改建议和评分。"
    dependsOn: [step2]
    reviewer: Alice
    evaluate: true
  - id: step4
    agent: Bob
    action: fix
    prompt: "请根据Alice的审查反馈，对AI科普文章进行修改和完善。要求：1）逐一处理审查中提出的所有问题；2）修正任何事实错误或不准确的表述；3）优化文章结构和逻辑流程；4）增强可读性和吸引力；5）保持文章的科普性质，不要过度专业化；6）确保修改后的文章质量有明显提升。请产出修改后的终稿版本。"
    dependsOn: [step3]
    evaluate: true
  - id: step5
    agent: Alice
    action: deploy
    prompt: "请作为项目负责人，对Bob修改后的最终版本进行最终确认。检查：1）所有审查意见是否已妥善解决；2）文章整体质量是否达到发布标准；3）格式、排版是否规范；4）确认可以正式发布。通过后，将文章保存为最终版本，并通知团队发布完成。"
    dependsOn: [step4]
    evaluate: true
