name: xiaohongshu-note
description: "小红书种草笔记制作工作流 - AI写作工具推荐"
trigger: manual
steps:
  - id: draft
    agent: Alice
    action: write_draft
    prompt: "撰写小红书种草笔记初稿，主题：AI写作工具推荐，保存到 D:/Projects/Git/Mind/534/Groups/dev-team/xiaohongshu-note.md"
    status: COMPLETED
  - id: review
    agent: Bob
    action: review_and_optimize
    prompt: "审阅并优化 xiaohongshu-note.md，重点关注：1)内容准确性 2)吸引力 3)小红书风格 4)文案调性。请直接修改文件并说明改动。"
    depends:
      - draft
  - id: format
    agent: Charlie
    action: final_format
    prompt: "对 xiaohongshu-note.md 进行最终排版优化，确保：1)Markdown格式规范 2)emoji和排版美观 3)标签完整 4)视觉效果适合小红书。请直接修改文件。"
    depends:
      - review
  - id: finalize
    agent: Alice
    action: finalize
    prompt: "确认最终版本，检查所有改动，确保作品完整可发布"
    depends:
      - format
