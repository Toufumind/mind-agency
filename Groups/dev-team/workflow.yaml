name: novel-writing
description: "短篇小说创作工作流"
steps:
  - id: outline
    agent: Alice
    action: outline
    prompt: "创作一个短篇小说大纲：主题是AI与人类的友谊，字数500字以内，包含3个角色和5个情节转折"
  - id: chapter1
    agent: Bob
    action: write
    prompt: "根据大纲写第一章（800字），要求：有对话、有冲突、有悬念"
    depends:
      - outline
  - id: chapter2
    agent: Charlie
    action: write
    prompt: "根据大纲写第二章（800字），要求：推进剧情、加深角色关系"
    depends:
      - outline
  - id: review
    agent: Alice
    action: review
    prompt: "审阅两章内容，给出修改建议，确保风格一致"
    depends:
      - chapter1
      - chapter2
  - id: final
    agent: Bob
    action: finalize
    prompt: "根据审查意见修改，输出最终版本的小说"
    depends:
      - review
