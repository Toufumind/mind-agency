name: deploy-pipeline
description: 完整部署流程：测试 → 构建 → 部署 → 验证 → 通知
concurrency: 2
trigger:
  type: schedule
  cron: "0 9 * * 1-5"
steps:
  - id: test
    agent: Alice
    action: test
    prompt: |
      运行 npm test 确认所有测试通过。
      回复: TEST_PASS 或 TEST_FAIL + 失败的测试
    reviewer: Bob
    routes:
      - step: build
        when: "output contains APPROVED"
      - step: fix_test
        when: "output contains REJECTED"

  - id: fix_test
    agent: Alice
    action: fix
    prompt: |
      修复失败的测试。
      回复: FIXED
    dependsOn: [test]

  - id: build
    agent: Bob
    action: build
    prompt: |
      运行 npm run build 确认构建成功。
      回复: BUILD_PASS + 产物大小
    dependsOn: [test]
    reviewer: Charlie
    routes:
      - step: deploy_staging
        when: "output contains APPROVED"
      - step: fix_build
        when: "output contains REJECTED"

  - id: fix_build
    agent: Bob
    action: fix
    prompt: |
      修复构建错误。
      回复: FIXED
    dependsOn: [build]

  - id: deploy_staging
    agent: Charlie
    action: deploy
    prompt: |
      部署到 staging 环境。
      执行 npm run build:exe。
      回复: STAGING_DEPLOYED
    dependsOn: [build]
    priority: high

  - id: verify
    agent: Alice
    action: verify
    prompt: |
      访问 staging 环境验证功能正常。
      回复: VERIFIED 或 VERIFY_FAILED
    dependsOn: [deploy_staging]

  - id: notify
    agent: Bob
    action: notify
    prompt: |
      在群里通知部署完成。
      使用 group_send 发送部署报告。
      回复: NOTIFIED
    dependsOn: [verify]
