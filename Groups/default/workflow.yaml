name: content-pipeline
description: 内容生产流水线 — 研究→创作→审查→发布，支持并行和循环

concurrency: 3

steps:
  # ── Phase 1: 并行研究 ──
  - id: research-market
    agent: Alice
    action: research
    prompt: |
      调研当前 AI Agent 协作平台市场，列出 5 个竞品及其核心功能。
    timeout: 120000

  - id: research-tech
    agent: Bob
    action: research
    prompt: |
      调研 Multi-Agent 架构模式（ReAct, Plan-and-Execute, CrewAI），总结优劣。
    timeout: 120000

  - id: research-users
    agent: Charlie
    action: research
    prompt: |
      调研目标用户画像：独立开发者 vs 团队，使用场景，痛点。
    timeout: 120000

  # ── Phase 2: 方案设计（依赖研究结果）──
  - id: design-arch
    agent: Alice
    action: create
    dependsOn: [research-market, research-tech]
    prompt: |
      基于市场调研和技术调研，设计 Mind Agency 的技术架构方案。
      输出：架构图描述 + 技术选型 + 模块划分。
    timeout: 180000

  - id: design-product
    agent: Bob
    action: create
    dependsOn: [research-market, research-users]
    prompt: |
      基于市场调研和用户调研，设计产品功能优先级和 MVP 范围。
      输出：功能列表 + 优先级矩阵 + MVP 定义。
    timeout: 180000

  # ── Phase 3: 并行开发 ──
  - id: dev-backend
    agent: Alice
    action: create
    dependsOn: [design-arch]
    prompt: |
      实现核心后端：Agent 代理、MCP 工具、工作流引擎。
      输出代码和 API 文档。
    timeout: 300000

  - id: dev-frontend
    agent: Bob
    action: create
    dependsOn: [design-arch, design-product]
    prompt: |
      实现前端界面：Dashboard、Agent 管理、群组协作。
      输出 React 组件代码。
    timeout: 300000

  - id: dev-docs
    agent: Charlie
    action: create
    dependsOn: [design-product]
    prompt: |
      编写用户文档和 API 文档。
      输出 Markdown 文档。
    timeout: 120000

  # ── Phase 4: 审查循环 ──
  - id: review-backend
    agent: Bob
    action: review
    dependsOn: [dev-backend]
    prompt: |
      审查后端代码质量、安全性、性能。
      输出：APPROVED 或 NEEDS_REVISION + 具体意见。
    timeout: 120000

  - id: fix-backend
    agent: Alice
    action: fix
    dependsOn: [review-backend]
    prompt: |
      根据 Bob 的审查意见修复后端代码。
    timeout: 180000
    routes:
      - step: review-backend
        when: "NEEDS_REVISION"

  - id: review-frontend
    agent: Charlie
    action: review
    dependsOn: [dev-frontend]
    prompt: |
      审查前端代码：UI/UX、响应式、无障碍。
      输出：APPROVED 或 NEEDS_REVISION + 具体意见。
    timeout: 120000

  - id: fix-frontend
    agent: Bob
    action: fix
    dependsOn: [review-frontend]
    prompt: |
      根据 Charlie 的审查意见修复前端代码。
    timeout: 180000
    routes:
      - step: review-frontend
        when: "NEEDS_REVISION"

  # ── Phase 5: 集成测试 ──
  - id: test-integration
    agent: Charlie
    action: verify
    dependsOn: [fix-backend, fix-frontend, dev-docs]
    prompt: |
      运行集成测试，验证前后端协作、API 接口、用户流程。
      输出：测试报告 + 通过/失败状态。
    timeout: 180000

  - id: test-e2e
    agent: Alice
    action: verify
    dependsOn: [test-integration]
    prompt: |
      端到端测试：从用户注册到创建 Agent 到执行工作流。
      输出：E2E 测试报告。
    timeout: 180000

  # ── Phase 6: 部署 ──
  - id: deploy-staging
    agent: Bob
    action: deploy
    dependsOn: [test-e2e]
    prompt: |
      部署到 staging 环境，验证生产配置。
    timeout: 120000

  - id: deploy-prod
    agent: Alice
    action: deploy
    dependsOn: [deploy-staging]
    prompt: |
      部署到生产环境，监控部署状态。
    timeout: 120000
