name: loop-test
description: 循环测试 — Alice 写，Bob 审查，不通过就回到 Alice 重写

steps:
  - id: write
    agent: Alice
    action: create
    prompt: |
      写一个简单的 Python 函数：判断一个数是否为质数。
      要求：包含类型注解和 docstring。
    timeout: 120000

  - id: review
    agent: Bob
    action: review
    dependsOn: [write]
    prompt: |
      审查代码质量。输出 VERDICT: APPROVED 或 NEEDS_REVISION
    timeout: 120000

  - id: rewrite
    agent: Alice
    action: create
    dependsOn: [review]
    prompt: |
      根据 Bob 的审查意见修改代码。
    timeout: 120000
    routes:
      - step: review
        when: "NEEDS_REVISION"
