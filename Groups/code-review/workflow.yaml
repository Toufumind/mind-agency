name: code-review-pipeline
steps:
  - id: code_review
    agent: Bob
    action: review
    dependsOn: []
    priority: high
  - id: build_check
    agent: Bob
    action: build
    dependsOn: [code_review]
  - id: deploy
    agent: Charlie
    action: deploy
    dependsOn: [build_check]
    priority: critical
