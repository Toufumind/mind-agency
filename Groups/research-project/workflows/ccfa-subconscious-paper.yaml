name: CCFA-Subconscious-LLM-Paper
description: "研究LLM是否具有类似人类潜意识的机制，撰写投稿CCFA会议的学术论文"

steps:
  # ── Phase 1: Literature Review ──
  - id: lit-review
    agent: Bob
    action: research
    prompt: |
      你是一位专注于AI可解释性领域的研究员。请全面调研以下主题的最新文献：
      1. LLM的隐式推理 (implicit reasoning) — 模型在没有显式chain-of-thought的情况下如何做出正确判断
      2. 潜空间表示 (latent representations) — 模型内部如何编码知识和推理过程
      3. 涌现能力 (emergent capabilities) — 未被显式训练的能力如何出现
      4. 注意力机制的隐式功能 — 注意力头中编码的隐含知识
      5. 人类潜意识认知的计算模型 — 现有理论框架

      请输出：
      - 至少引用15篇相关论文（给出完整引用信息）
      - 每篇论文的核心贡献和与本研究的关联
      - 现有研究的空白和本论文可以填补的gap
      - 保存为文件: lit-review.md
    evaluate: true

  - id: review-lit
    agent: Alice
    action: review
    prompt: |
      你是一位CCFA级别的审稿人，专注AI认知科学方向。请审查文献综述：
      1. 文献覆盖是否全面？是否遗漏了关键论文？
      2. 对现有空白的分析是否准确？
      3. 引用格式是否符合CCFA要求？
      4. 与本论文novelty的关联是否清晰？

      回复 APPROVED 或 REJECTED 并给出具体修改意见。
    dependsOn: [lit-review]
    evaluate: true

  # ── Phase 2: Theoretical Framework ──
  - id: theory
    agent: Alice
    action: create
    prompt: |
      基于文献综述，请构建"LLM潜意识"(LLM Subconscious)的理论框架。这是一个全新的概念，请从以下角度展开：

      1. 定义"LLM潜意识"：
         - 什么是LLM的"潜意识"？它与"显式推理"的区别是什么？
         - 类比人类潜意识：弗洛伊德的潜意识概念 vs LLM的潜空间
         - 操作性定义：如何在实验中测量和验证LLM潜意识的存在？

      2. 理论基础：
         - 信息论视角：潜空间中的信息压缩与隐式知识编码
         - 认知科学视角：双过程理论 (dual-process theory) 在LLM中的映射
         - 计算神经科学视角：类比人脑的意识/潜意识分层

      3. 可检验假设：
         - H1: LLM在没有显式推理链的情况下，其潜空间活动包含推理过程的痕迹
         - H2: 干扰潜空间表示会导致模型在简单任务上表现下降
         - H3: 模型的"直觉"回答（快速回答）与其"深思"回答（长coT）在潜空间中有不同的表征

      请输出完整的理论框架文档: theory-framework.md
    dependsOn: [review-lit]
    evaluate: true

  - id: review-theory
    agent: Bob
    action: review
    prompt: |
      你是一位计算认知科学领域的资深审稿人。请审查理论框架：
      1. "LLM潜意识"这个概念是否有理论深度？是否只是隐喻？
      2. 理论框架是否可操作化（operationalizable）？
      3. 假设是否可检验？实验设计是否可行？
      4. 与现有理论（如dual-process theory）的关系是否清楚？
      5. novelty如何？是否真的提出了新东西？

      回复 APPROVED 或 REJECTED 并给出详细意见。
    dependsOn: [theory]
    evaluate: true

  # ── Phase 3: Experiment Design ──
  - id: experiments
    agent: Charlie
    action: create
    prompt: |
      你是实验设计专家。基于理论框架，请设计3-4个实验来验证"LLM潜意识"假说：

      实验1: 潜空间探针 (Latent Space Probing)
      - 目标：验证模型在没有显式推理链时，潜空间是否包含推理痕迹
      - 方法：在不同层提取hidden states，训练线性探针分类器
      - 对比：有coT vs 无coT的潜空间表征差异
      - 预期结果：无coT时潜空间仍有推理相关的表征

      实验2: 潜空间干扰 (Latent Space Perturbation)
      - 目标：验证干扰潜空间会影响模型的"直觉"判断
      - 方法：添加定向噪声到特定层的hidden states
      - 测量：任务准确率的变化
      - 预期结果：特定层的干扰显著影响性能

      实验3: 双过程对比 (Dual-Process Comparison)
      - 目标：验证"快思考"和"慢思考"在潜空间中有不同表征
      - 方法：对比1-shot回答 vs 多步coT的内部表示
      - 分析：表征相似性分析 (RSA)
      - 预期结果：两种模式在高层有显著差异

      请输出详细的实验设计文档: experiments.md
    dependsOn: [review-theory]
    evaluate: true

  - id: review-experiments
    agent: Alice
    action: review
    prompt: |
      你是一位AI实验方法论专家。请审查实验设计：
      1. 实验设计是否严谨？是否有混淆变量？
      2. 基线设置是否合理？
      3. 统计分析方法是否正确？
      4. 预期结果的解读是否有多种可能？是否考虑了替代解释？
      5. 实验规模和计算资源需求是否现实？

      回复 APPROVED 或 REJECTED 并给出修改建议。
    dependsOn: [experiments]
    evaluate: true

  # ── Phase 4: Paper Writing ──
  - id: write-paper
    agent: Bob
    action: create
    prompt: |
      你是顶级AI会议论文写作者。请撰写完整的CCFA论文，格式严格遵循CCFA模板：

      Title: "Do LLMs Have a Subconscious? Exploring Latent Representations and Implicit Reasoning in Large Language Models"

      结构:
      1. Abstract (150-200 words)
      2. Introduction — 提出问题、现有不足、本文贡献
      3. Related Work — LLM可解释性、隐式推理、认知科学
      4. Theoretical Framework — "LLM潜意识"的形式化定义
      5. Methodology — 三个实验的设计
      6. Experiments — 实验设置、结果、分析
      7. Discussion — 理论意义、局限性、未来方向
      8. Conclusion
      9. References (至少20篇)

      要求:
      - 严格学术写作风格
      - 每个claim都要有实验数据支持
      - 讨论替代解释和局限性
      - 保存为: paper-draft.md
    dependsOn: [review-experiments]
    evaluate: true

  # ── Phase 5: Expert Review ──
  - id: expert-review-1
    agent: Alice
    action: review
    prompt: |
      你是CCFA 2026的审稿人，专注AI认知与可解释性方向。请以严格的学术标准审查这篇论文：

      评审维度 (每项1-10分):
      1. Novelty: 是否提出了真正新颖的概念和方法？
      2. Technical Soundness: 理论和实验是否严谨？
      3. Significance: 对领域的贡献有多大？
      4. Clarity: 写作是否清晰？论证是否连贯？
      5. Reproducibility: 实验是否可复现？

      请给出:
      - 总体评分 (1-10)
      - 每个维度的分数和详细意见
      - 必须修改的问题 (must-fix)
      - 建议修改的问题 (should-fix)
      - 亮点 (strengths)

      最终回复 ACCEPT / WEAK_ACCEPT / WEAK_REJECT / REJECT
    dependsOn: [write-paper]
    evaluate: true

  - id: revision
    agent: Bob
    action: fix
    prompt: |
      根据审稿人的意见，对论文进行全面修改。
      必须逐一解决所有must-fix问题。
      对should-fix问题尽量改进。
      保持论文的核心贡献不变。

      输出修改后的论文: paper-revised.md
      同时输出修改说明: revision-notes.md
    dependsOn: [expert-review-1]
    evaluate: true

  - id: expert-review-2
    agent: Charlie
    action: review
    prompt: |
      你是CCFA的第二位审稿人，专注实验方法论和统计分析。请进行第二轮评审：

      重点关注:
      1. 修改是否充分解决了第一轮的问题？
      2. 实验结果是否支持论文的claim？
      3. 统计分析是否正确？
      4. 图表是否清晰专业？
      5. 与最相关工作的对比是否公平？

      给出最终评分和建议。
      回复 ACCEPT / WEAK_ACCEPT / WEAK_REJECT / REJECT
    dependsOn: [revision]
    evaluate: true

  # ── Phase 6: Final Polish ──
  - id: final-polish
    agent: Alice
    action: create
    prompt: |
      你是论文终稿编辑。请对论文进行最终润色：
      1. 检查所有引用是否正确
      2. 确保格式符合CCFA模板
      3. 优化图表描述
      4. 检查拼写和语法
      5. 确保所有缩写首次出现时有定义

      输出最终版本: paper-final.md
    dependsOn: [expert-review-2]
    evaluate: true
